```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiteTube Neo</title>
<style>
:root{
  --bg:#0b0f19;
  --text:#e2e8f0;
  --card:#111827;
  --neon:#00f2fe;
  --glass:rgba(15,23,42,0.85);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",sans-serif;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
header{
  position:sticky;top:0;z-index:10;
  background:var(--glass);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:14px 16px;
  display:flex;justify-content:center;
}
.search-wrap{
  width:100%;max-width:680px;
  display:flex;align-items:center;
  background:var(--card);
  border:1px solid rgba(0,242,254,0.2);
  border-radius:999px;
  padding:6px 6px 6px 18px;
  transition:border-color 0.2s;
}
.search-wrap:focus-within{border-color:var(--neon)}
.search-wrap input{
  flex:1;background:transparent;border:0;outline:0;
  color:var(--text);font-size:15px;
}
.search-wrap button{
  width:40px;height:40px;border-radius:50%;border:0;
  background:var(--neon);color:#000;font-size:18px;cursor:pointer;
  display:grid;place-items:center;transition:transform 0.15s;
}
.search-wrap button:active{transform:scale(.92)}
main{padding:20px 16px 80px}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
  max-width:1400px;margin:0 auto;
}
.card{
  background:var(--card);
  border:1px solid rgba(255,255,255,0.04);
  border-radius:12px;overflow:hidden;
  cursor:pointer;transition:border-color 0.2s,transform 0.2s;
}
.card:hover{border-color:var(--neon);transform:translateY(-2px)}
.thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.title{
  padding:10px 12px;font-size:14px;font-weight:500;
  color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.meta{padding:0 12px 12px;font-size:12px;color:rgba(226,232,240,0.6)}
.player{
  position:relative;width:100%;aspect-ratio:16/9;background:#000;
  display:grid;place-items:center;overflow:hidden;
}
.player iframe{width:100%;height:100%;border:0}
.play-ring{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:88px;height:88px;border-radius:50%;
  border:2px solid var(--neon);background:rgba(0,242,254,0.08);
  display:grid;place-items:center;pointer-events:none;
  transition:transform 0.2s,background 0.2s;
}
.card:hover .play-ring{
  transform:translate(-50%,-50%) scale(1.08);
  background:rgba(0,242,254,0.15);
}
.play-ring::after{
  content:"";border-left:22px solid var(--neon);
  border-top:14px solid transparent;border-bottom:14px solid transparent;
  margin-left:4px;
}
.sentinel{height:1px}
.loader{color:rgba(226,232,240,0.5);text-align:center;padding:20px;font-size:14px}
@media(max-width:520px){.grid{gap:12px}header{padding:12px}}
</style>
</head>
<body>
<header>
  <div class="search-wrap">
    <input id="q" type="text" placeholder="Search LiteTube Neo" autocomplete="off" aria-label="Search videos">
    <button id="go" aria-label="Search">🔍</button>
  </div>
</header>

<main>
  <div id="grid" class="grid"></div>
  <div id="sentinel" class="sentinel"></div>
  <div id="loader" class="loader">Scroll for more</div>
</main>

<script>
const API_KEY = 'AIzaSyAM53NgSNnew8hTJ53cDtLg0rxIoo75aN4';
const BATCH = 8;
const BLANK = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==';

let nextPageToken = '';
let currentQuery = 'trending';
let loading = false;
let endReached = false;

const grid = document.getElementById('grid');
const sentinel = document.getElementById('sentinel');
const loader = document.getElementById('loader');
const qInput = document.getElementById('q');
const goBtn = document.getElementById('go');

const imgObserver = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      const img = entry.target;
      const src = img.dataset.src;
      if(src){img.src = src; img.removeAttribute('data-src')}
      imgObserver.unobserve(img);
    }
  });
},{rootMargin:'200px'});

const scrollObserver = new IntersectionObserver((entries)=>{
  if(entries[0].isIntersecting){loadBatch()}
},{rootMargin:'300px'});

scrollObserver.observe(sentinel);

function buildCard(item){
  const videoId = item.id.videoId;
  const snip = item.snippet;
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="thumb-wrap">
      <img src="${BLANK}" data-src="${snip.thumbnails.default.url}" alt="${snip.title}">
      <div class="play-ring"></div>
    </div>
    <div class="title" title="${snip.title}">${snip.title}</div>
    <div class="meta">${snip.channelTitle}</div>
  `;
  const img = card.querySelector('img');
  imgObserver.observe(img);
  card.addEventListener('click',()=>activatePlayer(card,videoId));
  return card;
}

function activatePlayer(card,videoId){
  const wrap = card.querySelector('.thumb-wrap');
  const currentOrigin = window.location.origin; 
  
  const src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&vq=tiny&loop=1&playlist=${videoId}&rel=0&modestbranding=1&controls=1&origin=${currentOrigin}`;
  
  wrap.className = 'player';
  wrap.innerHTML = `<iframe src="${src}" allow="autoplay; encrypted-media" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>`;
}

async function fetchBatch(){
  if(loading || endReached) return;
  loading = true;
  loader.textContent = 'Loading...';
  
  try{
    const url = new URL('https://www.googleapis.com/youtube/v3/search');
    url.searchParams.set('part','snippet');
    url.searchParams.set('maxResults',BATCH);
    url.searchParams.set('type','video');
    url.searchParams.set('q',currentQuery);
    url.searchParams.set('key',API_KEY);
    if(nextPageToken) url.searchParams.set('pageToken',nextPageToken);

    const res = await fetch(url);
    
    if(!res.ok) throw new Error('API error');
    
    const data = await res.json();
    
    if(data.error){
      loader.textContent = 'API Quota exceeded. Try later.';
      console.error('YouTube API Error:', data.error);
      return;
    }
    
    nextPageToken = data.nextPageToken || '';
    if(!nextPageToken) endReached = true;
    (data.items||[]).forEach(item=>{
      grid.appendChild(buildCard(item));
    });
    loader.textContent = endReached? 'No more results' : 'Scroll for more';
  }catch(e){
    console.error('Error:', e);
    loader.textContent = 'Error loading data. Try again.';
  }
  loading = false;
}

function loadBatch(){fetchBatch()}

function newSearch(){
  const val = qInput.value.trim();
  if(!val) return;
  currentQuery = val;
  grid.innerHTML = '';
  nextPageToken = '';
  endReached = false;
  loadBatch();
}

goBtn.addEventListener('click',newSearch);
qInput.addEventListener('keydown',e=>{if(e.key==='Enter')newSearch()});

loadBatch();
</script>
</body>
</html>
