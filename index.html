<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiteTube Pro</title>
<style>
:root{--bg:#050A18; --card:#0F172A; --neon:#00F2FE; --neon2:#4F46E5; --text:#E2E8F0;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Roboto,sans-serif;overflow-y:scroll;height:100vh}
.splash-screen{position:fixed;inset:0;width:100%;height:100%;background:linear-gradient(135deg, #050A18, #0F172A);z-index:9999;display:flex;align-items:center;justify-content:center;gap:24px;animation:fadeOutSplash 0.4s ease-out 1s forwards}
.splash-screen.hidden{display:none}
@keyframes fadeOutSplash{from{opacity:1}to{opacity:0;pointer-events:none}}
.bhati-container{display:flex;gap:12px;font-size:64px;font-weight:900;letter-spacing:8px;font-family:'Arial Black', sans-serif}
.bhati-letter{background:linear-gradient(135deg, #FFD700, var(--neon), var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;animation:letterPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;filter:drop-shadow(0 0 15px rgba(0, 242, 254, 0.4))}
@keyframes letterPop{0%{opacity:0;transform:scale(0)}100%{opacity:1;transform:scale(1)}}
header{position:sticky;top:0;z-index:20;background:rgba(5,10,24,0.85);backdrop-filter:blur(12px);padding:12px 16px;display:flex;gap:12px;align-items:center;justify-content:center;border-bottom:1px solid rgba(0,242,254,0.08)}
.search-wrap{width:100%;max-width:640px;display:flex;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:999px;padding:8px}
.search-wrap input{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:16px;padding:0 12px}
.search-wrap button{width:44px;height:44px;border-radius:50%;border:0;background:linear-gradient(135deg,var(--neon),var(--neon2));color:#000;font-size:18px;cursor:pointer}
.header-controls{display:flex;gap:8px;align-items:center}
.toggle-btn{min-width:44px;padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text);cursor:pointer;font-weight:700;font-size:12px}
.toggle-btn.active{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#000}
.toggle-btn.hidden{display:none}
.quota-banner{background:#ff9500;color:#000;text-align:center;padding:10px;font-weight:700;display:none}
.demo-badge{background:#4F46E5;color:#fff;font-size:11px;padding:2px 8px;border-radius:999px;margin-left:8px}
main{padding:18px 12px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;max-width:1600px;margin:0 auto}
.grid.shorts{display:block;max-width:100%;scroll-snap-type:y mandatory;overflow-y:scroll;height:calc(100vh - 70px)}
.short{width:100%;height:100vh;scroll-snap-align:start;background:#000;position:relative}
.short iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.short-meta{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:24px 18px 80px;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.8))}
.card{background:var(--card);border:1px solid rgba(255,255,255,0.04);border-radius:14px;overflow:hidden;cursor:pointer;transition:0.28s}
.card:hover{transform:translateY(-6px);border-color:var(--neon)}
.thumb{position:relative;width:100%;aspect-ratio:16/9;background:#000}
.thumb img{width:100%;height:100%;object-fit:cover}
.play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;background:rgba(0,242,254,0.86);border-radius:50%;display:grid;place-items:center;opacity:0;transition:0.22s}
.card:hover .play-btn{opacity:1}
.play-btn::after{content:"";border-left:16px solid #000;border-top:11px solid transparent;border-bottom:11px solid transparent;margin-left:3px}
.info{padding:12px}
.title{font-size:15px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.channel{font-size:13px;color:rgba(226,232,240,0.62);margin-top:6px}
.modal{position:fixed;inset:0;width:100%;height:100%;background:#000;z-index:100;display:none}
.modal.active{display:block}
.modal-content{width:100%;height:100%;position:relative}
.modal-content iframe{width:100%;height:100%;border:0}
.close{position:absolute;top:15px;left:15px;z-index:999;padding:8px 14px;border-radius:999px;border:none;background:rgba(0,0,0,0.6);color:#fff;cursor:pointer}
.loader{text-align:center;padding:26px;color:rgba(226,232,240,0.5)}
.error{text-align:center;padding:20px;color:#ff6b6b}
</style>
</head>
<body>

<div id="quotaBanner" class="quota-banner">⚠️ API Quota Khatam. <span class="demo-badge">DEMO MODE</span> Cached videos dikh rahe hain</div>
<div id="splashScreen" class="splash-screen"><div class="bhati-container" id="bhatiContainer"></div></div>

<header>
  <div class="search-wrap"><input id="q" type="text" placeholder="Search LiteTube Pro..."><button id="go">🔍</button></div>
  <div class="header-controls"><button id="turbo-toggle" class="toggle-btn active">Turbo: ON</button><button id="shorts-toggle" class="toggle-btn">Shorts: OFF</button></div>
</header>

<main>
  <div id="grid" class="grid"></div>
  <div id="loader" class="loader">Loading...</div>
  <div id="error" class="error" style="display:none"></div>
</main>

<div id="modal" class="modal">
  <div class="modal-content">
    <button class="close" id="close">⬅ Back</button>
    <iframe id="player" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen referrerpolicy="no-referrer"></iframe>
  </div>
</div>

<script>
function initSplashScreen(){
  const container = document.getElementById('bhatiContainer');
  const text = 'BHATI';
  text.split('').forEach((char,i)=>{
    const letter = document.createElement('span');
    letter.className = 'bhati-letter';
    letter.textContent = char;
    letter.style.animationDelay = (i*0.12) + 's';
    container.appendChild(letter);
  });
  setTimeout(() => {document.getElementById('splashScreen').classList.add('hidden')}, 1000);
}
initSplashScreen();

// IMPORTANT: Yaha apni key daalo
const API_KEYS = ['AIzaSyAM53NgSNnew8hTJ53cDtLg0rxIoo75aN4','AIzaSyC9OPfYIz6sX9KaWyUnF59dzFp_Uya6JXw'];
let keyIndex = 0;
let currentQuery = 'trending';
let loading = false;
let pageToken = '';
let quotaDead = false;
let turboEnabled = true;
let shortsMode = false;

const grid = document.getElementById('grid');
const loader = document.getElementById('loader');
const errorBox = document.getElementById('error');
const modal = document.getElementById('modal');
const player = document.getElementById('player');
const closeBtn = document.getElementById('close');
const searchInput = document.getElementById('q');
const turboBtn = document.getElementById('turbo-toggle');
const shortsBtn = document.getElementById('shorts-toggle');
const quotaBanner = document.getElementById('quotaBanner');

function getCacheKey(q, token){ return `litetube_${q}_${token}_${shortsMode}` }
function getFromCache(key){
  const item = localStorage.getItem(key);
  if(!item) return null;
  const data = JSON.parse(item);
  if(Date.now() - data.time > 600000) return null; // 10 min cache
  return data.data;
}
function setCache(key, data){
  localStorage.setItem(key, JSON.stringify({data, time: Date.now()}));
}

function updateShortsBtnVisibility(){
  shortsBtn.classList.toggle('hidden', !turboEnabled);
  if(!turboEnabled && shortsMode){ shortsMode = false; shortsBtn.textContent = 'Shorts: OFF'; loadVideos(true); }
}

function buildCard(item){
  if(!item.id?.videoId) return null;
  const thumb = item.snippet.thumbnails.medium?.url;
  const card = document.createElement('div');
  card.className = shortsMode ? 'short' : 'card';
  if(shortsMode){
    card.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${item.id.videoId}?autoplay=1&mute=1&loop=1&playlist=${item.id.videoId}" allow="autoplay"></iframe><div class="short-meta"><div class="title">${item.snippet.title}</div><div class="channel">${item.snippet.channelTitle}</div></div>`;
  } else {
    card.innerHTML = `<div class="thumb"><img src="${thumb}" loading="lazy"><div class="play-btn"></div></div><div class="info"><div class="title">${item.snippet.title}</div><div class="channel">${item.snippet.channelTitle}</div></div>`;
    card.onclick = () => openModal(item.id.videoId);
  }
  return card;
}

function openModal(videoId){
  player.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1`;
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}
closeBtn.onclick = ()=>{modal.classList.remove('active');player.src='';document.body.style.overflow='auto'};

function buildUrl(token){
  const key = API_KEYS[keyIndex];
  return `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=8&type=video&videoEmbeddable=true&q=${encodeURIComponent(currentQuery)}&key=${key}${token?`&pageToken=${token}`:''}`;
}

async function loadVideos(reset = false){
  if(loading) return;
  if(reset){ pageToken=''; grid.innerHTML=''; quotaDead=false; quotaBanner.style.display='none'; }
  
  const cacheKey = getCacheKey(currentQuery, pageToken);
  const cached = getFromCache(cacheKey);
  if(cached){ appendItems(cached.items); pageToken = cached.nextPageToken; loading=false; return; }

  if(quotaDead){ loader.style.display='none'; return; }
  loading=true; loader.style.display='block'; errorBox.style.display='none';

  try{
    const res = await fetch(buildUrl(pageToken));
    const data = await res.json();
    if(data.error){
      if(data.error.code === 403){
        keyIndex = (keyIndex+1) % API_KEYS.length;
        if(keyIndex===0){ quotaDead=true; quotaBanner.style.display='block'; throw new Error('All Keys Quota Finished'); }
        return loadVideos(false); // retry with next key
      }
      throw new Error(data.error.message);
    }
    setCache(cacheKey, data);
    appendItems(data.items);
    pageToken = data.nextPageToken;
    loader.style.display = pageToken ? 'block' : 'none';
  }catch(err){
    errorBox.textContent = 'Error: ' + err.message;
    errorBox.style.display = 'block';
  }
  loading=false;
}

function appendItems(items){
  items.forEach(item=>{ const c=buildCard(item); if(c) grid.appendChild(c) });
}

window.addEventListener('scroll',()=>{ 
  if((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 300){
    if(!shortsMode) loadVideos()
  }
});

document.getElementById('go').onclick = ()=>{currentQuery = searchInput.value.trim() || 'trending';loadVideos(true)}
searchInput.addEventListener('keydown', e=>{if(e.key === 'Enter') document.getElementById('go').click()});

turboBtn.onclick = ()=>{turboEnabled =!turboEnabled;turboBtn.textContent = turboEnabled? 'Turbo: ON' : 'Turbo: OFF';turboBtn.classList.toggle('active');updateShortsBtnVisibility();loadVideos(true)};
shortsBtn.onclick = ()=>{if(!turboEnabled) return; shortsMode =!shortsMode;shortsBtn.textContent = shortsMode? 'Shorts: ON' : 'Shorts: OFF';shortsBtn.classList.toggle('active');loadVideos(true)};

updateShortsBtnVisibility();
loadVideos();
</script>
</body>
</html>
