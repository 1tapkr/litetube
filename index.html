<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LITETUBE PRO</title>
<style>
:root{
--bg:#0f0f0f;
--card:#212121;
--hover:#303030;
--red:#ff0000;
--white:#f1f1f1;
--muted:#aaaaaa;
--border:#303030;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Roboto,Arial,sans-serif;}
body{background:var(--bg);color:var(--white);}

#bhatiIntro{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#0f0f0f;font-size:65px;font-weight:900;letter-spacing:8px;color:var(--red);z-index:9999;animation:hideIntro 1s forwards;}
@keyframes hideIntro{0%,70%{opacity:1;}100%{opacity:0;visibility:hidden;}}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:var(--bg);padding:0 16px;height:56px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);}
.logo{font-size:20px;font-weight:900;color:var(--red);letter-spacing:-0.5px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.search{flex:1;display:flex;max-width:640px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:40px;overflow:hidden;height:40px;}
.search input{flex:1;padding:0 16px;background:none;border:0;outline:none;color:white;font-size:15px;}
.search button{width:64px;border:0;background:var(--hover);cursor:pointer;color:white;font-size:18px;}
.search button:hover{background:#3d3d3d;}

/* CHIPS / ACTIONS */
.actions{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:56px;z-index:99;}
.actions button{background:var(--card);color:white;border:0;padding:8px 12px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500;white-space:nowrap;}
.actions button.active{background:#fff;color:#000;}
.actions button:hover{background:var(--hover);}

/* GRID */
.main{padding:24px 16px 30px;max-width:1800px;margin:0 auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px 12px;}
.card{background:transparent;border-radius:12px;overflow:hidden;cursor:pointer;}
.thumb{height:180px;background:#000;border-radius:12px;overflow:hidden;position:relative;}
.thumb img{width:100%;height:100%;object-fit:cover;transition:0.2s;}
.card:hover.thumb img{transform:scale(1.03);}
.info{display:flex;gap:12px;padding:12px 0;}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--card);flex-shrink:0;}
.text{flex:1;}
.title{font-weight:500;font-size:15px;line-height:1.4;max-height:2.8em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.channel{color:var(--muted);font-size:13px;margin-top:4px;}
.meta{color:var(--muted);font-size:13px;}
.loading{text-align:center;padding:20px;color:var(--muted);font-size:14px;}

/* SHORTS */
.short-wrapper{width:360px;height:640px;background:#000;border-radius:12px;overflow:hidden;margin-bottom:16px;position:relative;}
.short-wrapper iframe{border-radius:12px;}

/* PLAYER */
.player-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;display:flex;justify-content:center;align-items:center;}
.player-box{width:90%;max-width:1200px;aspect-ratio:16/9;position:relative;}
.player-box iframe{width:100%;height:100%;border:0;border-radius:12px;}
.close-btn{position:absolute;top:-40px;right:0;color:white;font-size:30px;cursor:pointer;font-weight:300;}
</style>
</head>
<body>

<div id="bhatiIntro">BHATI</div>

<div class="header">
<div class="logo">▶ LITETUBE</div>
<div class="search">
<input id="searchInput" placeholder="Search">
<button id="searchBtn">🔍</button>
</div>
</div>

<div class="actions">
<button id="videoBtn" class="active">All</button>
<button id="shortBtn">Shorts</button>
<button id="saveBtn">💾 Data Saver</button>
</div>

<main class="main">
<div class="grid" id="grid"></div>
<div id="loadingIndicator" class="loading" style="display:none;">Loading...</div>
</main>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const API_KEYS=["AIzaSyC9OPfYIz6sX9KaWyUnF59dzFp_Uya6JXw","AIzaSyAM53NgSNnew8hTJ53cDtLg0rxIoo75aN4"];
let keyIndex=0;
let query="trending";
let nextToken="";
let loading=false;
let dataSaver=false;
let shortsMode=false;
let shortsPlayers={};
let currentPlayingShort=null;
let loadRequestId=0;
let shortsObserver=null;
const grid=document.getElementById("grid");
const input=document.getElementById("searchInput");
const searchBtn=document.getElementById("searchBtn");
const saveBtn=document.getElementById("saveBtn");
const videoBtn=document.getElementById("videoBtn");
const shortBtn=document.getElementById("shortBtn");
const loadingIndicator=document.getElementById("loadingIndicator");

function saveCache(key,data){try{localStorage.setItem(key,JSON.stringify({time:Date.now(),data:data}));}catch(e){}}
function getCache(key){try{let x=JSON.parse(localStorage.getItem(key));if(!x)return null;if(Date.now()-x.time>1200000){localStorage.removeItem(key);return null;}return x.data;}catch(e){return null;}}

function makeURL(isShorts=false){
let limit=dataSaver?8:20;
let q=isShorts?query+" shorts":query;
return "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults="+limit+"&q="+encodeURIComponent(q)+"&key="+API_KEYS[keyIndex]+(nextToken?"&pageToken="+nextToken:"");
}

async function fetchWithKeyRotation(url){
let attempts=0;let lastError=null;
while(attempts<API_KEYS.length){
try{let res=await fetch(url);let data=await res.json();if(data.error){if(data.error.code===403||data.error.code===400){keyIndex=(keyIndex+1)%API_KEYS.length;url=url.replace(/key=[^&]*/, "key="+API_KEYS[keyIndex]);attempts++;continue;}throw new Error(data.error.message||"API Error");}return data;}
catch(e){lastError=e;keyIndex=(keyIndex+1)%API_KEYS.length;url=url.replace(/key=[^&]*/, "key="+API_KEYS[keyIndex]);attempts++;}}
throw lastError||new Error("All API keys failed");
}

function getThumbUrl(snippet,id){
let thumbs=snippet.thumbnails||{};
let url=dataSaver? thumbs.medium?.url : thumbs.high?.url;
return url||`https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
}

function createCard(item){
let id=item.id.videoId;
let title=item.snippet.title;
let channel=item.snippet.channelTitle;
let image=getThumbUrl(item.snippet,id);
let div=document.createElement("div");
div.className="card";
div.innerHTML=`<div class="thumb"><img loading="lazy" src="${image}" alt=""></div><div class="info"><div class="avatar"></div><div class="text"><div class="title">${title}</div><div class="channel">${channel}</div></div></div>`;
div.onclick=()=>openPlayer(id);
return div;
}

function openPlayer(id){
let box=document.createElement("div");
box.className="player-overlay";
let autoplay=dataSaver?0:1;
box.innerHTML=`<div class="player-box"><span class="close-btn" onclick="this.closest('.player-overlay').remove()">✖</span><iframe src="https://www.youtube.com/embed/${id}?autoplay=${autoplay}&rel=0&origin=${window.location.origin}" allowfullscreen allow="autoplay"></iframe></div>`;
document.body.appendChild(box);
}

async function loadVideos(clear=true){
if(loading)return;loading=true;loadRequestId++;const currentRequest=loadRequestId;loadingIndicator.style.display="block";
if(clear){grid.innerHTML="";nextToken="";}
let cacheKey="bhati_"+query+"_"+dataSaver+"_"+(nextToken||"first");
let old=getCache(cacheKey);
if(old){if(currentRequest!==loadRequestId){loading=false;loadingIndicator.style.display="none";return;}showVideos(old.items);nextToken=old.nextPageToken||"";loading=false;loadingIndicator.style.display="none";return;}
try{let res=await fetchWithKeyRotation(makeURL(false));if(currentRequest!==loadRequestId){loading=false;loadingIndicator.style.display="none";return;}saveCache(cacheKey,res);showVideos(res.items);nextToken=res.nextPageToken||"";}
catch(e){console.log(e);}
loading=false;loadingIndicator.style.display="none";
}
function showVideos(items){if(!items)return;items.forEach(item=>{if(item.id&&item.id.videoId){grid.appendChild(createCard(item));}});}

searchBtn.onclick=()=>{query=input.value.trim()||"trending";if(shortsMode){loadShorts(true);}else{loadVideos(true);}};
input.onkeydown=e=>{if(e.key==="Enter") searchBtn.click();};

saveBtn.onclick=()=>{
dataSaver=!dataSaver;
saveBtn.classList.toggle("active");
saveBtn.innerHTML=dataSaver?"💾 Saver ON":"💾 Data Saver";
if(shortsMode){loadShorts(true);}else{loadVideos(true);}
};

shortBtn.onclick=()=>{shortsMode=true;videoBtn.classList.remove("active");shortBtn.classList.add("active");loadShorts(true);};
videoBtn.onclick=()=>{shortsMode=false;videoBtn.classList.add("active");shortBtn.classList.remove("active");if(shortsObserver)shortsObserver.disconnect();Object.values(shortsPlayers).forEach(p=>{try{p.pauseVideo();}catch(e){}});shortsPlayers={};currentPlayingShort=null;grid.style.display="grid";loadVideos(true);};

function onYouTubeIframeAPIReady(){}

async function loadShorts(clear=true){
if(loading)return;loading=true;loadingIndicator.style.display="block";
if(clear){grid.innerHTML="";grid.style.display="flex";grid.style.flexDirection="column";grid.style.alignItems="center";nextToken="";Object.values(shortsPlayers).forEach(p=>{try{p.destroy();}catch(e){}});shortsPlayers={};currentPlayingShort=null;}

let url=makeURL(true);
try{let res=await fetchWithKeyRotation(url);loadingIndicator.style.display="none";
res.items.forEach(item=>{
let id=item.id.videoId;let box=document.createElement("div");box.className="short-wrapper";
let iframeId="short_iframe_"+id+"_"+Math.random();
box.innerHTML=`<iframe id="${iframeId}" data-videoid="${id}" src="https://www.youtube.com/embed/${id}?enablejsapi=1&mute=0&playsinline=1&rel=0&autoplay=0&controls=0&origin=${window.location.origin}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
grid.appendChild(box);
});
nextToken=res.nextPageToken||"";
setTimeout(initShortsPlayers,300);}catch(e){console.log(e);loadingIndicator.style.display="none";}
loading=false;
}

function initShortsPlayers(){grid.querySelectorAll("iframe[id^='short_iframe_']").forEach(iframe=>{let id=iframe.dataset.videoid;if(!shortsPlayers[id]){shortsPlayers[id]=new YT.Player(iframe.id,{events:{'onReady':()=>{}}});}});setupShortsObserver();}
function setupShortsObserver(){if(shortsObserver)shortsObserver.disconnect();shortsObserver=new IntersectionObserver((entries)=>{entries.forEach(entry=>{let iframe=entry.target.querySelector("iframe");if(!iframe)return;let id=iframe.dataset.videoid;let player=shortsPlayers[id];if(!player)return;if(entry.isIntersecting&&entry.intersectionRatio>=0.7){if(currentPlayingShort&&currentPlayingShort!==id){try{shortsPlayers[currentPlayingShort].pauseVideo();}catch(e){}}try{player.playVideo();}catch(e){}currentPlayingShort=id;}else{try{player.pauseVideo();}catch(e){}if(currentPlayingShort===id)currentPlayingShort=null;}});},{threshold:[0.7],rootMargin:"0px"});grid.querySelectorAll(".short-wrapper").forEach(box=>{shortsObserver.observe(box);});}

let infiniteLoading=false;
window.addEventListener("scroll",()=>{
if(window.innerHeight+window.scrollY>=document.body.offsetHeight-800){
if(!infiniteLoading&&!loading&&nextToken){
infiniteLoading=true;
if(shortsMode){loadShorts(false).finally(()=>{infiniteLoading=false;});}
else{loadVideos(false).finally(()=>{infiniteLoading=false;});}
}}});

loadVideos(true);
console.log("BHATI LITETUBE PRO READY 🚀 New UI");
</script>
</body>
</html>
