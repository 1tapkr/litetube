<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>                             LITETUBE PRO</title>

<style>

:root{
--bg:#070b12;
--card:#111827;
--blue:#00e5ff;
--purple:#8b5cf6;
--white:#fff;
--muted:#94a3b8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--white);
}


/* BHATI INTRO */

#bhatiIntro{

position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;

background:#070b12;

font-size:65px;
font-weight:900;
letter-spacing:18px;

color:var(--blue);

z-index:9999;

animation:hideIntro 1.4s forwards;

}


#bhatiIntro span{

opacity:0;

display:inline-block;

transform:translateY(20px);

animation:
showLetter .15s forwards;

}


@keyframes showLetter{

to{
opacity:1;
transform:translateY(0);
}

}


@keyframes hideIntro{

0%,80%{
opacity:1;
}

100%{
opacity:0;
visibility:hidden;
}

}




/* HEADER */

.header{

height:65px;

position:fixed;

top:0;

left:0;

right:0;

display:flex;

align-items:center;

gap:10px;

padding:0 18px;

background:rgba(7,11,12,.9);

backdrop-filter:blur(10px);

border-bottom:1px solid #1e293b;

z-index:10;

}


.logo{

font-size:25px;

font-weight:900;

letter-spacing:2px;

background:linear-gradient(
90deg,
var(--blue),
var(--purple)
);

-webkit-background-clip:text;

color:transparent;

}



.search{

flex:1;

display:flex;

max-width:600px;

background:#111827;

border:1px solid #243044;

border-radius:12px;

overflow:hidden;

}


.search input{

flex:1;

padding:12px;

background:none;

border:0;

outline:none;

color:white;

}


.search button{

width:50px;

border:0;

background:var(--blue);

cursor:pointer;

}





/* ACTIONS */

.actions{

display:flex;

align-items:center;

gap:7px;

}


.actions button,
.quota{

background:#111827;

color:white;

border:1px solid #243044;

padding:8px 10px;

border-radius:10px;

font-size:12px;

cursor:pointer;

}


.quota{

color:#22c55e;

}





/* MAIN */

.main{

padding:90px 25px 30px;

}



.grid{

display:grid;

grid-template-columns:

repeat(auto-fill,minmax(250px,1fr));

gap:18px;

}



.card{

background:var(--card);

border-radius:15px;

overflow:hidden;

border:1px solid #1e293b;

cursor:pointer;

}


.thumb{

height:145px;

display:flex;

align-items:center;

justify-content:center;

background:linear-gradient(
135deg,
#172554,
#020617
);

font-size:40px;

color:var(--blue);

}


.info{

padding:12px;

}


.title{

font-weight:700;

font-size:14px;

}


.channel{

color:var(--muted);

font-size:12px;

margin-top:5px;

}



@media(max-width:700px){

.actions button{

font-size:10px;

padding:7px;

}


.logo{

font-size:18px;

}

}


</style>

</head>

<body>


<div id="bhatiIntro">
BHATI
</div>



<header class="header">


<div class="logo">

</div>



<div class="search">

<input id="searchInput"
placeholder="Search videos...">


<button id="searchBtn">
🔍
</button>

</div>



<div class="actions">


<button id="videoBtn">
🎬 Videos
</button>


<button id="shortBtn">
🎞 Shorts
</button>


<button id="saveBtn">
💾 Saver
</button>

</div>


</header>



<main class="main">


<div class="grid" id="grid">


<div class="card">

<div class="thumb">
▶
</div>

<div class="info">

<div class="title">
Loading...
</div>

<div class="channel">
BHATI
</div>

</div>

</div>


</div>


</main>
<script>

const API_KEYS=[
"AIzaSyC9OPfYIz6sX9KaWyUnF59dzFp_Uya6JXw",
"AIzaSyAM53NgSNnew8hTJ53cDtLg0rxIoo75aN4"
];


let keyIndex=0;
let query="trending videos";
let nextToken="";
let loading=false;
let dataSaver=true;


const grid=document.getElementById("grid");
const input=document.getElementById("searchInput");
const searchBtn=document.getElementById("searchBtn");
const saveBtn=document.getElementById("saveBtn");
const quota=document.getElementById("quota");



/* CACHE */

function saveCache(key,data){

try{

localStorage.setItem(
key,
JSON.stringify({
time:Date.now(),
data:data
})
);

}catch(e){}

}


function getCache(key){

try{

let x=JSON.parse(
localStorage.getItem(key)
);

if(!x)return null;


if(Date.now()-x.time>1200000){

localStorage.removeItem(key);

return null;

}

return x.data;


}catch(e){

return null;

}

}




/* API */

function makeURL(){

let limit=dataSaver?6:10;


return "https://www.googleapis.com/youtube/v3/search"
+
"?part=snippet"
+
"&type=video"
+
"&maxResults="+limit
+
"&q="+encodeURIComponent(query)
+
"&key="+API_KEYS[keyIndex]
+
(nextToken?
"&pageToken="+nextToken:"");

}




/* CARD */

function createCard(item){

let id=item.id.videoId;

let title=item.snippet.title;

let channel=item.snippet.channelTitle;

let image=item.snippet.thumbnails.medium.url;


let div=document.createElement("div");

div.className="card";


div.innerHTML=`

<div class="thumb">

${
dataSaver
?
"▶"
:
`<img src="${image}" style="width:100%;height:100%;object-fit:cover">`
}

</div>


<div class="info">

<div class="title">
${title}
</div>


<div class="channel">
${channel}
</div>


</div>

`;


div.onclick=()=>openPlayer(id);


return div;

}




/* PLAYER */

function openPlayer(id){

let box=document.createElement("div");


box.style.position="fixed";
box.style.inset="0";
box.style.background="rgba(0,0,0,.9)";
box.style.zIndex="999";


box.innerHTML=`

<iframe

src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1"

style="
width:90%;
height:70%;
margin:8% 5%;
border:0;
"

allowfullscreen>

</iframe>

`;


box.onclick=()=>box.remove();


document.body.appendChild(box);

}





/* LOAD VIDEOS */

async function loadVideos(clear=true){


if(loading)return;


loading=true;


if(clear){

grid.innerHTML="";

nextToken="";

}



let cacheKey=
"bhati_"+query+"_"+dataSaver;


let old=getCache(cacheKey);



if(old){

showVideos(old.items);

nextToken=
old.nextPageToken||"";

loading=false;

return;

}



try{


let res=await fetch(makeURL());

let data=await res.json();



if(data.error){


if(!window.quotaPopup){

alert(
"API quota limit reached."
);

window.quotaPopup=true;

}


quota.innerHTML=
"API: LIMIT";


loading=false;

return;

}



saveCache(cacheKey,data);


showVideos(data.items);


nextToken=
data.nextPageToken||"";


quota.innerHTML=
"API: OK";



}catch(e){

console.log(e);

}


loading=false;

}




function showVideos(items){

if(!items)return;


items.forEach(item=>{

grid.appendChild(
createCard(item)
);

});

}





/* SEARCH */

searchBtn.onclick=()=>{

query=
input.value.trim()
||
"trending videos";


loadVideos(true);

};



input.onkeydown=e=>{

if(e.key==="Enter")
searchBtn.click();

};





/* DATA SAVER */

saveBtn.onclick=()=>{


dataSaver=!dataSaver;


saveBtn.innerHTML=
dataSaver
?
"💾 Saver"
:
"📶 Data";


loadVideos(true);

};




loadVideos(true);


</script>
<script>


/* =====================
      SHORTS MODE
===================== */


let shortsMode=false;


const shortBtn=
document.getElementById("shortBtn");


const videoBtn=
document.getElementById("videoBtn");



shortBtn.onclick=()=>{

shortsMode=true;

loadShorts();

};



videoBtn.onclick=()=>{

shortsMode=false;

grid.style.display="grid";

loadVideos(true);

};





async function loadShorts(){


grid.innerHTML="";


grid.style.display="flex";

grid.style.flexDirection="column";

grid.style.alignItems="center";



let url=

"https://www.googleapis.com/youtube/v3/search"

+

"?part=snippet"

+

"&type=video"

+

"&maxResults=8"

+

"&q=shorts"

+

"&key="+API_KEYS[keyIndex];



try{


let res=await fetch(url);

let data=await res.json();



data.items.forEach(item=>{


let id=item.id.videoId;



let box=document.createElement("div");


box.style.width="350px";

box.style.height="620px";

box.style.background="#000";

box.style.borderRadius="18px";

box.style.overflow="hidden";

box.style.marginBottom="20px";



box.innerHTML=`

<iframe

src="https://www.youtube-nocookie.com/embed/${id}"

style="
width:100%;
height:100%;
border:0;
"

allowfullscreen>

</iframe>

`;



grid.appendChild(box);



});


}catch(e){

console.log(e);

}


}





/* =====================
      INFINITE LOAD
===================== */


window.addEventListener(
"scroll",
()=>{


if(shortsMode)return;



if(

window.innerHeight+
window.scrollY
>=
document.body.offsetHeight-400

){


if(nextToken)

loadVideos(false);


}


});





/* =====================
    NETWORK SAVER
===================== */


if(navigator.connection){


let speed=
navigator.connection.effectiveType;



if(
speed==="2g" ||
speed==="slow-2g"
){

dataSaver=true;

saveBtn.innerHTML="💾 Saver";

}


}





console.log(
"BHATI LITETUBE PRO READY 🚀"
);



</script>


</body>
</html>
