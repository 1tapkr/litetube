<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LITETUBE PRO</title>
<style>
:root{
--bg:#070b12;
--card:#111827;
--blue:#00e5ff;
--purple:#8b5cf6;
--white:#fff;
--muted:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Arial,sans-serif;}
body{background:var(--bg);color:var(--white);}
#bhatiIntro{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#070b12;font-size:65px;font-weight:900;letter-spacing:18px;color:var(--blue);z-index:9999;animation:hideIntro 1.4s forwards;}
@keyframes hideIntro{0%,80%{opacity:1;}100%{opacity:0;visibility:hidden;}}
.search{margin:15px auto;display:flex;max-width:600px;background:#111827;border:1px solid #243044;border-radius:12px;overflow:hidden;}
.search input{flex:1;padding:12px;background:none;border:0;outline:none;color:white;}
.search button{width:50px;border:0;background:var(--blue);cursor:pointer;}
.actions{display:flex;justify-content:center;align-items:center;gap:5px;margin-bottom:15px;}
.actions button{background:#111827;color:white;border:1px solid #243044;padding:6px 8px;border-radius:10px;font-size:11px;cursor:pointer;}
.actions button.active{background:var(--blue);color:#000;border-color:var(--blue);}
.main{padding:20px 25px 30px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px;}
.card{background:var(--card);border-radius:15px;overflow:hidden;border:1px solid #1e293b;cursor:pointer;}
.thumb{height:145px;background:#000;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.info{padding:12px;}
.title{font-weight:700;font-size:14px;}
.channel{color:var(--muted);font-size:12px;margin-top:5px;}
.loading{text-align:center;padding:20px;color:var(--muted);font-size:14px;}
</style>
</head>
<body>

<div id="bhatiIntro">BHATI</div>

<div class="search">
<input id="searchInput" placeholder="Search videos...">
<button id="searchBtn">🔍</button>
</div>
<div class="actions">
<button id="videoBtn" class="active">🎬 Videos</button>
<button id="shortBtn">🎞 Shorts</button>
<button id="saveBtn">💾 Data Saver</button>
</div>

<main class="main">
<div class="grid" id="grid"></div>
<div id="loadingIndicator" class="loading" style="display:none;">Loading...</div>
</main>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const API_KEYS=["AIzaSyC9OPfYIz6sX9KaWyUnF59dzFp_Uya6JXw","AIzaSyAM53NgSNnew8hTJ53cDtLg0rxIoo75aN4"];
let keyIndex=0;
let query="trending videos";
let nextToken="";
let loading=false;
let dataSaver=false; // default off
let shortsMode=false;
let shortsPlayers={};
let currentPlayingShort=null;
let loadRequestId=0;
let shortsObserver=null;
const grid=document.getElementById("grid");
const input=document.getElementById("searchInput");
const searchBtn=document.getElementById("searchBtn");
const saveBtn=document.getElementById("saveBtn");
const videoBtn=document.getElementById("videoBtn");
const shortBtn=document.getElementById("shortBtn");
const loadingIndicator=document.getElementById("loadingIndicator");

function saveCache(key,data){try{localStorage.setItem(key,JSON.stringify({time:Date.now(),data:data}));}catch(e){}}
function getCache(key){try{let x=JSON.parse(localStorage.getItem(key));if(!x)return null;if(Date.now()-x.time>1200000){localStorage.removeItem(key);return null;}return x.data;}catch(e){return null;}}

/* 1. DATA SAVER ON HAI TO KAM VIDEO LOAD HOGA */
function makeURL(isShorts=false){
let limit=dataSaver?6:12; // Saver ON = 6 videos, OFF = 12 videos
let q=isShorts?query+" shorts":query; // FIX 1: अब सर्च वाला query use होगा + shorts
return "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults="+limit+"&q="+encodeURIComponent(q)+"&key="+API_KEYS[keyIndex]+(nextToken?"&pageToken="+nextToken:"");
}

async function fetchWithKeyRotation(url){
let attempts=0;let lastError=null;
while(attempts<API_KEYS.length){
try{let res=await fetch(url);let data=await res.json();if(data.error){if(data.error.code===403||data.error.code===400){keyIndex=(keyIndex+1)%API_KEYS.length;url=url.replace(/key=[^&]*/, "key="+API_KEYS[keyIndex]);attempts++;continue;}throw new Error(data.error.message||"API Error");}return data;}
catch(e){lastError=e;keyIndex=(keyIndex+1)%API_KEYS.length;url=url.replace(/key=[^&]*/, "key="+API_KEYS[keyIndex]);attempts++;}}
throw lastError||new Error("All API keys failed");
}

/* 2. DATA SAVER ON HAI TO CHOTA THUMBNAIL */
function getThumbUrl(snippet,id){
let thumbs=snippet.thumbnails||{};
let url=dataSaver? thumbs.medium?.url : thumbs.high?.url; // Saver ON = medium, OFF = high
return url||`https://i.ytimg.com/vi/${id}/mqdefault.jpg`;
}

function createCard(item){
let id=item.id.videoId;
let title=item.snippet.title;
let channel=item.snippet.channelTitle;
let image=getThumbUrl(item.snippet,id);
let div=document.createElement("div");
div.className="card";
div.innerHTML=`<div class="thumb"><img loading="lazy" src="${image}" onerror="this.onerror=null;this.src='https://i.ytimg.com/vi/${id}/mqdefault.jpg'" alt=""></div><div class="info"><div class="title">${title}</div><div class="channel">${channel}</div></div>`;
div.onclick=()=>openPlayer(id);
return div;
}

/* 3. YOUTUBE.COM USE KIYA - ERROR 153 FIX + AUTOPLAY BAND IN SAVER */
function openPlayer(id){
let box=document.createElement("div");
box.style.position="fixed";box.style.inset="0";box.style.background="rgba(0,0,0,.9)";box.style.zIndex="999";
let autoplay=dataSaver?0:1; // Saver ON = autoplay band
box.innerHTML=`<iframe src="https://www.youtube.com/embed/${id}?autoplay=${autoplay}&rel=0&origin=${window.location.origin}" style="width:90%;height:70%;margin:8% 5%;border:0;" allowfullscreen allow="autoplay"></iframe><div style="position:absolute;top:20px;right:30px;color:white;font-size:30px;cursor:pointer" onclick="this.parentElement.remove()">✖</div>`;
document.body.appendChild(box);
}

async function loadVideos(clear=true){
if(loading)return;loading=true;loadRequestId++;const currentRequest=loadRequestId;loadingIndicator.style.display="block";
if(clear){grid.innerHTML="";nextToken="";}
let cacheKey="bhati_"+query+"_"+dataSaver+"_"+(nextToken||"first");
let old=getCache(cacheKey);
if(old){if(currentRequest!==loadRequestId){loading=false;loadingIndicator.style.display="none";return;}showVideos(old.items);nextToken=old.nextPageToken||"";loading=false;loadingIndicator.style.display="none";return;}
try{let res=await fetchWithKeyRotation(makeURL(false));if(currentRequest!==loadRequestId){loading=false;loadingIndicator.style.display="none";return;}saveCache(cacheKey,res);showVideos(res.items);nextToken=res.nextPageToken||"";}
catch(e){console.log(e);}
loading=false;loadingIndicator.style.display="none";
}
function showVideos(items){if(!items)return;items.forEach(item=>{if(item.id&&item.id.videoId){grid.appendChild(createCard(item));}});}

searchBtn.onclick=()=>{
query=input.value.trim()||"trending videos";
if(shortsMode){loadShorts(true);}else{loadVideos(true);}
};
input.onkeydown=e=>{if(e.key==="Enter") searchBtn.click();};

/* DATA SAVER BUTTON */
saveBtn.onclick=()=>{
dataSaver=!dataSaver;
saveBtn.classList.toggle("active");
saveBtn.innerHTML=dataSaver?"💾 Saver ON":"💾 Data Saver";
if(shortsMode){loadShorts(true);}else{loadVideos(true);}
};

/* SHORTS */
shortBtn.onclick=()=>{shortsMode=true;videoBtn.classList.remove("active");shortBtn.classList.add("active");loadShorts(true);};
videoBtn.onclick=()=>{shortsMode=false;videoBtn.classList.add("active");shortBtn.classList.remove("active");if(shortsObserver)shortsObserver.disconnect();Object.values(shortsPlayers).forEach(p=>{try{p.pauseVideo();}catch(e){}});shortsPlayers={};currentPlayingShort=null;grid.style.display="grid";loadVideos(true);};

function onYouTubeIframeAPIReady(){}

async function loadShorts(clear=true){ // FIX 2: अब clear और nextToken support
if(loading)return;loading=true;loadingIndicator.style.display="block";
if(clear){grid.innerHTML="";grid.style.display="flex";grid.style.flexDirection="column";grid.style.alignItems="center";nextToken="";Object.values(shortsPlayers).forEach(p=>{try{p.destroy();}catch(e){}});shortsPlayers={};currentPlayingShort=null;}

let url="https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=8&q="+encodeURIComponent(query+" shorts")+"&key="+API_KEYS[keyIndex]+(nextToken?"&pageToken="+nextToken:"");
try{let res=await fetchWithKeyRotation(url);loadingIndicator.style.display="none";
res.items.forEach(item=>{
let id=item.id.videoId;let box=document.createElement("div");box.className="short-wrapper";
box.style.width="350px";box.style.height="620px";box.style.background="#000";box.style.borderRadius="18px";box.style.overflow="hidden";box.style.marginBottom="20px";
let iframeId="short_iframe_"+id+"_"+Date.now()+Math.random();
box.innerHTML=`<iframe id="${iframeId}" data-videoid="${id}" src="https://www.youtube.com/embed/${id}?enablejsapi=1&mute=1&playsinline=1&rel=0&autoplay=0&controls=0&origin=${window.location.origin}" style="width:100%;height:100%;border:0;" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
grid.appendChild(box);
});
nextToken=res.nextPageToken||"";
setTimeout(initShortsPlayers,500);}catch(e){console.log(e);loadingIndicator.style.display="none";}
loading=false;
}

function initShortsPlayers(){grid.querySelectorAll("iframe[id^='short_iframe_']").forEach(iframe=>{let id=iframe.dataset.videoid;if(!shortsPlayers[id]){shortsPlayers[id]=new YT.Player(iframe.id,{events:{'onReady':()=>{}}});}});setupShortsObserver();}
function setupShortsObserver(){if(shortsObserver)shortsObserver.disconnect();shortsObserver=new IntersectionObserver((entries)=>{entries.forEach(entry=>{let iframe=entry.target.querySelector("iframe");if(!iframe)return;let id=iframe.dataset.videoid;let player=shortsPlayers[id];if(!player)return;if(entry.isIntersecting&&entry.intersectionRatio>=0.7){if(currentPlayingShort&&currentPlayingShort!==id){try{shortsPlayers[currentPlayingShort].pauseVideo();}catch(e){}}try{player.playVideo();}catch(e){}currentPlayingShort=id;}else{try{player.pauseVideo();}catch(e){}if(currentPlayingShort===id)currentPlayingShort=null;}});},{threshold:[0.7],rootMargin:"0px"});grid.querySelectorAll(".short-wrapper").forEach(box=>{shortsObserver.observe(box);});}

let infiniteLoading=false;
window.addEventListener("scroll",()=>{
if(window.innerHeight+window.scrollY>=document.body.offsetHeight-500){
if(!infiniteLoading&&!loading&&nextToken){
infiniteLoading=true;
if(shortsMode){loadShorts(false).finally(()=>{infiniteLoading=false;});} // FIX 3: Shorts में भी infinite
else{loadVideos(false).finally(()=>{infiniteLoading=false;});}
}
}});

loadVideos(true); // pehli baar load
console.log("BHATI LITETUBE PRO READY 🚀 Data Saver Ready");
</script>
</body>
</html>
