<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteTube Neo - Next-Gen Ultra Data Saver</title>
    <style>
        body { 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            font-family: 'system-ui', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            padding-bottom: 60px;
        }
        header {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        @media (min-width: 600px) {
            header { flex-direction: row; justify-content: space-between; }
        }
        .brand-area h1 { 
            color: #00f2fe; 
            font-size: 22px; 
            margin: 0;
            letter-spacing: 0.5px;
            font-weight: 800;
        }
        .brand-area .logo-tag {
            font-size: 10px;
            font-weight: bold;
            color: #050505;
            background: #00f2fe;
            padding: 1px 6px;
            border-radius: 20px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .sub-text { color: #64748b; font-size: 11px; margin: 2px 0 0 0; }
        .search-container {
            display: flex;
            width: 100%;
            max-width: 380px;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 4px;
            box-sizing: border-box;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .search-container input {
            flex: 1;
            padding: 6px 14px;
            border: none;
            background: transparent;
            color: white;
            font-size: 13px;
            outline: none;
        }
        .search-container button {
            width: 36px;
            height: 36px;
            border: none;
            background: #00f2fe;
            color: #0f172a;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .search-container button:hover { transform: scale(1.05); }
        #status-message {
            text-align: center;
            color: #64748b;
            font-size: 13px;
            margin: 25px auto;
        }
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 16px; 
            max-width: 1200px; 
            margin: 20px auto 0 auto; 
            padding: 0 16px; 
        }
        .video-card { 
            background: #111827; 
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            transition: border-color 0.2s;
        }
        .video-card:hover { border-color: rgba(0, 242, 254, 0.3); }
        .video-title { 
            font-size: 12px; 
            font-weight: 500; 
            margin: 10px; 
            line-height: 1.4; 
            color: #cbd5e1; 
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .lite-player { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            background-color: #030712; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .lite-player img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute; 
            top: 0; 
            left: 0; 
            opacity: 0.65; 
        }
        .play-btn { 
            position: relative; 
            width: 44px; 
            height: 44px; 
            background: rgba(15, 23, 42, 0.85); 
            border: 2px solid #00f2fe;
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 2; 
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
            transition: background 0.2s, transform 0.2s;
        }
        .play-btn::before { 
            content: ''; 
            display: block; 
            width: 0; 
            height: 0; 
            border-style: solid; 
            border-width: 5px 0 5px 9px; 
            border-color: transparent transparent transparent #00f2fe; 
            margin-left: 3px; 
        }
        .lite-player:hover .play-btn { 
            background: #00f2fe; 
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }
        .lite-player:hover .play-btn::before {
            border-color: transparent transparent transparent #0f172a; 
        }
        .lite-player iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: 0; 
            z-index: 3; 
        }
        #scroll-trigger {
            height: 60px;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-area">
            <h1>LiteTube<span class="logo-tag">NEO</span></h1>
            <p class="sub-text">⚡ Zero-Tracking • Pure Savings • Scroll to Load</p>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" value="Trending Videos" placeholder="Kuch bhi search karein...">
            <button id="search-btn">🔍</button>
        </div>
    </header>

    <div class="video-grid" id="video-display-grid"></div>
    
    <div id="status-message">Loading light network stream...</div>
    
    <div id="scroll-trigger"></div>

    <script>
        const API_KEY = 'AIzaSyAM53NgSNnew8hTJ53cDtLg0rxIoo75aN4'; 

        const videoGrid = document.getElementById('video-display-grid');
        const statusMessage = document.getElementById('status-message');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const scrollTrigger = document.getElementById('scroll-trigger');

        let nextDataPageToken = ''; 
        let currentSearchQuery = '';
        let isFetchingData = false;

        async function fetchVideos(query, isLoadMore = false) {
            if (isFetchingData) return;
            isFetchingData = true;
            
            statusMessage.style.display = 'block';
            statusMessage.innerText = "Connecting to lite nodes...";

            if (!isLoadMore) {
                videoGrid.innerHTML = '';
                nextDataPageToken = '';
                currentSearchQuery = query;
            }

            try {
                let apiURL = `https://googleapis.com{encodeURIComponent(query)}&type=video&key=${API_KEY}`;
                if (isLoadMore && nextDataPageToken) {
                    apiURL += `&pageToken=${nextDataPageToken}`;
                }

                const response = await fetch(apiURL);
                const data = await response.json();

                if (!data.items || data.items.length === 0) {
                    statusMessage.innerText = isLoadMore ? "End of streams." : "No nodes found.";
                    isFetchingData = false;
                    return;
                }

                nextDataPageToken = data.nextPageToken || '';
                statusMessage.style.display = 'none';

                data.items.forEach(item => {
                    const videoId = item.id.videoId;
                    if (!videoId) return; 

                    const title = item.snippet.title;
                    const thumbnail = item.snippet.thumbnails.default ? item.snippet.thumbnails.default.url : 'https://placeholder.com';

                    const cardHTML = `
                        <div class="video-card">
                            <div class="lite-player" data-id="${videoId}">
                                <img data-src="${thumbnail}" alt="Thumbnail" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
                                <div class="play-btn"></div>
                            </div>
                            <div class="video-title">${title}</div>
                        </div>
                    `;
                    videoGrid.innerHTML += cardHTML;
                });

                activateLazyLoadingImages();
                activateDataSaverPlayers();
                isFetchingData = false;

            } catch (error) {
                console.error(error);
                statusMessage.innerText = "Network overhead. Retry connection.";
                isFetchingData = false;
            }
        }

        function activateLazyLoadingImages() {
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        if(img.getAttribute('data-src')) {
                            img.src = img.getAttribute('data-src'); 
                            img.removeAttribute('data-src');
                            }
observer.unobserve(img);
}
});
}, { rootMargin: "0px 0px 100px 0px" });

document.querySelectorAll('.lite-player img[data-src]').forEach(img => imageObserver.observe(img));
}

const swipeObserver = new IntersectionObserver((entries) => {
if (entries.isIntersecting && nextDataPageToken && !isFetchingData) {
fetchVideos(currentSearchQuery, true);
}
}, { threshold: 0.1 });

swipeObserver.observe(scrollTrigger);

function activateDataSaverPlayers() {
document.querySelectorAll('.lite-player').forEach(player => {
player.addEventListener('click', function() {
if (this.querySelector('iframe')) return;

const videoId = this.getAttribute('data-id');
const iframe = document.createElement('iframe');

iframe.setAttribute('src', https://youtube-nocookie.com{videoId}?autoplay=1&modestbranding=1&rel=0&loop=1&playlist=${videoId}&vq=tiny);
iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
iframe.setAttribute('allowfullscreen', 'true');

this.appendChild(iframe);
});
});
}

searchBtn.addEventListener('click', () => fetchVideos(searchInput.value));
searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchVideos(searchInput.value); });

window.onload = () => {
fetchVideos(searchInput.value);
};
