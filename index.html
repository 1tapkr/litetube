<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiteTube Pro</title>

<style>
:root{
  --bg:#050A18; --card:#0F172A; --neon:#00F2FE; --neon2:#4F46E5; --text:#E2E8F0;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',Roboto,sans-serif;
  overflow-y:scroll;
  height:100vh;
}

header{
  position:sticky;
  top:0;
  z-index:20;
  background:rgba(5,10,24,0.85);
  backdrop-filter:blur(12px);
  padding:12px 16px;
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid rgba(0,242,254,0.08)
}

.search-wrap{
  width:100%;
  max-width:640px;
  display:flex;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:999px;
  padding:8px;
  backdrop-filter:blur(8px);
  transition:0.3s;
}

.search-wrap:focus-within{border-color:var(--neon);box-shadow:0 0 18px rgba(0,242,254,0.14)}

.search-wrap input{
  flex:1;
  background:transparent;
  border:0;
  outline:0;
  color:var(--text);
  font-size:16px;
  padding:0 12px
}

.search-wrap button{
  width:44px;
  height:44px;
  border-radius:50%;
  border:0;
  background:linear-gradient(135deg,var(--neon),var(--neon2));
  color:#000;
  font-size:18px;
  cursor:pointer;
  transition:0.2s
}

.search-wrap button:hover{transform:scale(1.05)}

.header-controls{
  display:flex;
  gap:8px;
  align-items:center;
}

.toggle-btn{
  min-width:44px;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.06);
  background:transparent;
  color:var(--text);
  cursor:pointer;
  font-weight:700;
  transition:0.15s;
}
.toggle-btn.active{
  background:linear-gradient(135deg,var(--neon),var(--neon2));
  color:#000;
  transform:scale(1.02);
}

main{padding:18px 12px 80px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:18px;
  max-width:1600px;
  margin:0 auto
}

.card{
  background:var(--card);
  border:1px solid rgba(255,255,255,0.04);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:0.28s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 40px rgba(0,0,0,0.45);
  border-color:var(--neon);
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.4s;
  filter:blur(1.2px) brightness(0.86);
}

.card:hover .thumb img{
  filter:blur(0px) brightness(1);
  transform:scale(1.03);
}

.thumb{position:relative;width:100%;aspect-ratio:16/9;background:#000}

.play-btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:56px;
  height:56px;
  background:rgba(0,242,254,0.86);
  border-radius:50%;
  display:grid;
  place-items:center;
  opacity:0;
  transition:0.22s
}

.card:hover .play-btn{opacity:1}

.play-btn::after{
  content:"";
  border-left:16px solid #000;
  border-top:11px solid transparent;
  border-bottom:11px solid transparent;
  margin-left:3px
}

.info{padding:12px}

.title{
  font-size:15px;
  font-weight:600;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden
}

.channel{
  font-size:13px;
  color:rgba(226,232,240,0.62);
  margin-top:6px
}

/* Shorts / vertical mode styles */
.grid.shorts{
  display:block;
  max-width:100%;
  gap:0;
  padding:0;
}
.short{
  width:100%;
  min-height:calc(100vh - 72px); /* full view minus header */
  display:flex;
  align-items:flex-end;
  justify-content:center;
  background:#000;
  position:relative;
  margin-bottom:6px;
}
.short .short-inner{
  width:100%;
  max-width:720px;
  height:100%;
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}
.short iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
  background:#000;
}
.short .short-meta{
  position:relative;
  z-index:10;
  padding:18px;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,0.55));
}
.short .title{font-size:18px}
.short .channel{font-size:14px}

/* Volume Indicator Badge */
.volume-badge{
  position:absolute;
  top:20px;
  right:20px;
  z-index:15;
  padding:8px 14px;
  background:rgba(0,242,254,0.9);
  color:#000;
  border-radius:999px;
  font-weight:600;
  font-size:12px;
  animation:slideIn 0.4s ease-out;
}
@keyframes slideIn{
  from{transform:translateX(100px);opacity:0}
  to{transform:translateX(0);opacity:1}
}

/* Modal (grid view player) */
.modal{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  background:#000;
  z-index:100;
  display:none;
}
.modal.active{display:block}
.modal-content{
  width:100%;
  height:100%;
  position:relative;
}
.modal-content iframe{
  width:100%;
  height:100%;
  border:0;
}
.close{
  position:absolute;
  top:15px;
  left:15px;
  z-index:999;
  padding:8px 14px;
  border-radius:999px;
  border:none;
  background:rgba(0,0,0,0.6);
  color:#fff;
  cursor:pointer;
  backdrop-filter:blur(8px);
  font-weight:600;
}

.loader{
  text-align:center;
  padding:26px;
  color:rgba(226,232,240,0.5)
}

.error{
  text-align:center;
  padding:20px;
  color:#ff6b6b
}

@media(max-width:600px){
  .grid{gap:14px}
  .short .short-inner{max-width:100%}
  .volume-badge{top:10px;right:10px;font-size:11px;padding:6px 10px}
}
</style>
</head>

<body>

<header>
  <div class="search-wrap">
    <input id="q" type="text" placeholder="Search LiteTube Pro...">
    <button id="go">🔍</button>
  </div>

  <div class="header-controls" aria-hidden="false">
    <button id="turbo-toggle" class="toggle-btn active" title="Turbo Net Mode (on by default)">Turbo: ON</button>
    <button id="shorts-toggle" class="toggle-btn" style="display:none" title="Shorts view (only when Turbo is OFF)">Shorts: OFF</button>
  </div>
</header>

<main>
  <div id="grid" class="grid"></div>
  <div id="loader" class="loader">Loading more...</div>
  <div id="error" class="error" style="display:none"></div>
</main>

<!-- FULLSCREEN PLAYER (grid mode) -->
<div id="modal" class="modal" aria-hidden="true">
  <div class="modal-content">
    <button class="close" id="close">⬅ Back</button>
    <iframe id="player" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
  </div>
</div>

<script>
/*
  Behavior summary:
  - Turbo toggle (default ON) reduces network options: when ON, Shorts toggle hidden and app stays grid/list mode.
  - Turbo OFF => Shorts toggle visible; if user enables Shorts, vertical short scroll mode activates.
  - Shorts mode loads only the iframe for the currently visible short (IntersectionObserver) to save network.
  - Grid mode uses thumbnails and opens modal iframe only on click (same as before).
  - Primary/secondary API fallback and infinite scroll preserved.
  - NEW: Shorts auto-unmute on load with visual badge 🔊
*/

// API keys (keep them secure in production)
const PRIMARY_API_KEY = 'AIzaSyAM53NgSNnew8hTJ53cDtLg0rxIoo75aN4';
const SECONDARY_API_KEY = 'AIzaSyC9OPfYIz6sX9KaWyUnF59dzFp_Uya6JXw';

// State
let currentQuery = 'trending';
let loading = false;
let currentApi = 'primary';
let primaryPageToken = '';
let secondaryPageToken = '';
let primaryExhausted = false;
let secondaryExhausted = false;

let turboEnabled = true; // default ON
let shortsToggleVisible = false;
let shortsMode = false; // whether vertical shorts are active

const grid = document.getElementById('grid');
const loader = document.getElementById('loader');
const errorBox = document.getElementById('error');
const modal = document.getElementById('modal');
const player = document.getElementById('player');
const closeBtn = document.getElementById('close');
const searchInput = document.getElementById('q');
const turboBtn = document.getElementById('turbo-toggle');
const shortsBtn = document.getElementById('shorts-toggle');

function buildGridCard(item){
  if(!item.id?.videoId) return null;
  const thumb = item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url || '';
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="thumb">
      <img src="${thumb}" alt="${escapeHtml(item.snippet.title)}" loading="lazy">
      <div class="play-btn" aria-hidden="true"></div>
    </div>
    <div class="info">
      <div class="title">${escapeHtml(item.snippet.title)}</div>
      <div class="channel">${escapeHtml(item.snippet.channelTitle)}</div>
    </div>
  `;
  card.onclick = () => openModal(item.id.videoId);
  return card;
}

function buildShortCard(item){
  if(!item.id?.videoId) return null;
  const videoId = item.id.videoId;
  const title = item.snippet.title;
  const channel = item.snippet.channelTitle;
  const thumb = item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url || '';
  const short = document.createElement('div');
  short.className = 'short';
  short.dataset.videoId = videoId;
  short.innerHTML = `
    <div class="short-inner">
      <div class="thumb" style="flex:1;position:relative">
        <img src="${thumb}" alt="${escapeHtml(title)}" style="width:100%;height:100%;object-fit:cover;filter:brightness(0.8)">
      </div>
      <div class="short-meta">
        <div class="title">${escapeHtml(title)}</div>
        <div class="channel">${escapeHtml(channel)}</div>
      </div>
      <div class="iframe-container" style="position:absolute;inset:0;z-index:5"></div>
    </div>
  `;
  return short;
}

function escapeHtml(str){
  return String(str || '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function openModal(videoId){
  closeModal();
  const origin = window.location.origin;
  player.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&controls=1&modestbranding=1&origin=${origin}&playsinline=1`;
  modal.classList.add('active');
  modal.setAttribute('aria-hidden','false');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  modal.classList.remove('active');
  modal.setAttribute('aria-hidden','true');
  player.src = '';
  document.body.style.overflow = 'auto';
}
closeBtn.onclick = closeModal;
modal.onclick = (e)=>{ if(e.target === modal) closeModal() };
document.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closeModal() });

function buildUrl(api, pageToken){
  const key = (api === 'primary') ? PRIMARY_API_KEY : SECONDARY_API_KEY;
  let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=12&type=video&q=${encodeURIComponent(currentQuery)}&key=${key}`;
  if(pageToken) url += `&pageToken=${pageToken}`;
  return url;
}

// 🔊 VOLUME UNMUTE BADGE ANIMATION
function showVolumeUnmuteBadge(shortElement){
  const badge = document.createElement('div');
  badge.className = 'volume-badge';
  badge.textContent = '🔊 Volume ON';
  shortElement.appendChild(badge);
  setTimeout(()=>{ badge.remove() }, 2500);
}

// IntersectionObserver for shorts: load only the visible iframe
let shortsObserver = null;
function ensureShortsObserver(){
  if(shortsObserver) return;
  shortsObserver = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      const el = entry.target;
      const container = el.querySelector('.iframe-container');
      if(entry.isIntersecting && entry.intersectionRatio > 0.55){
        // load iframe for this short
        const vid = el.dataset.videoId;
        if(container && !container.querySelector('iframe')){
          const origin = window.location.origin;
          const ifr = document.createElement('iframe');
          ifr.allow = 'autoplay; encrypted-media; picture-in-picture';
          ifr.allowFullscreen = true;
          ifr.referrerPolicy = 'strict-origin-when-cross-origin';
          // 🔊 UNMUTED: Changed mute=1 to mute=0 for auto-unmute on load
          ifr.src = `https://www.youtube-nocookie.com/embed/${vid}?autoplay=1&rel=0&controls=1&modestbranding=1&origin=${origin}&playsinline=1&mute=0`;
          container.appendChild(ifr);
          // Show volume unmute badge
          showVolumeUnmuteBadge(el);
          // remove iframe from siblings to ensure single active iframe
          document.querySelectorAll('.short .iframe-container').forEach(c=>{
            if(c !== container && c.querySelector('iframe')) c.innerHTML = '';
          });
        }
      } else {
        // remove iframe when not visible to save network
        if(container && container.querySelector('iframe')){
          container.innerHTML = '';
        }
      }
    });
  }, {threshold:[0.55]});
}

// Append items to UI depending on mode
function appendItems(items){
  if(!items || !items.length) return;
  if(shortsMode){
    grid.classList.add('shorts');
    items.forEach(item=>{
      const s = buildShortCard(item);
      if(s){
        grid.appendChild(s);
        ensureShortsObserver();
        shortsObserver.observe(s);
      }
    });
  }else{
    grid.classList.remove('shorts');
    items.forEach(item=>{
      const c = buildGridCard(item);
      if(c) grid.appendChild(c);
    });
  }
}

// Main loader with primary/secondary fallback
async function loadVideos(reset = false){
  if(loading) return;

  if(reset){
    primaryPageToken = '';
    secondaryPageToken = '';
    primaryExhausted = false;
    secondaryExhausted = false;
    currentApi = 'primary';
    grid.innerHTML = '';
  }

  if(primaryExhausted && secondaryExhausted){
    loader.style.display = 'none';
    return;
  }

  if(currentApi === 'primary' && primaryExhausted) currentApi = 'secondary';
  if(currentApi === 'secondary' && secondaryExhausted) currentApi = 'primary';

  if((currentApi === 'primary' && primaryExhausted) || (currentApi === 'secondary' && secondaryExhausted)){
    loader.style.display = 'none';
    return;
  }

  loading = true;
  loader.style.display = 'block';
  errorBox.style.display = 'none';
  loader.textContent = currentApi === 'primary' ? 'Loading more...' : 'Loading more (fallback)...';

  const pageToken = (currentApi === 'primary') ? primaryPageToken : secondaryPageToken;
  const url = buildUrl(currentApi, pageToken);

  try{
    const res = await fetch(url);
    const data = await res.json();
    if(data.error) throw new Error(data.error.message || 'API error');

    appendItems(data.items || []);

    if(currentApi === 'primary'){
      primaryPageToken = data.nextPageToken || '';
      if(!primaryPageToken) primaryExhausted = true;
    } else {
      secondaryPageToken = data.nextPageToken || '';
      if(!secondaryPageToken) secondaryExhausted = true;
    }

    // If primary exhausted and secondary available, switch but do NOT auto-fetch if turbo ON.
    if(currentApi === 'primary' && primaryExhausted && !secondaryExhausted){
      currentApi = 'secondary';
      // If turbo is OFF and shortsMode active, fetch fallback immediately for continuous shorts experience,
      // otherwise defer until user scrolls to save network when turbo ON.
      if(!turboEnabled || shortsMode){
        // small delay for UI update then fetch
        setTimeout(()=>{ loading = false; loadVideos(); }, 250);
        return;
      } else {
        // don't auto-fetch to save network; show option to continue (loader hidden)
        loader.textContent = 'Primary exhausted — switch to fallback when needed.';
      }
    }

    // Manage loader visibility
    const moreOnActive = (currentApi === 'primary') ? !!primaryPageToken : !!secondaryPageToken;
    const moreOnOther = (currentApi === 'primary') ? (!!secondaryPageToken && !secondaryExhausted) : (!!primaryPageToken && !primaryExhausted);

    if(moreOnActive || moreOnOther){
      loader.style.display = 'block';
      loader.textContent = moreOnActive ? (currentApi === 'primary' ? 'Loading more...' : 'Loading more (fallback)...') : 'Switching to fallback API...';
    }else{
      loader.style.display = 'none';
    }

  }catch(err){
    console.error(err);
    if(currentApi === 'primary' && !secondaryExhausted){
      primaryExhausted = true;
      currentApi = 'secondary';
      errorBox.textContent = 'Primary API failed or hit quota — switching to fallback API.';
      errorBox.style.display = 'block';
      loading = false;
      setTimeout(()=>loadVideos(), 300);
      return;
    } else if(currentApi === 'secondary' && !primaryExhausted){
      secondaryExhausted = true;
      currentApi = 'primary';
      errorBox.textContent = 'Fallback API failed — returning to primary.';
      errorBox.style.display = 'block';
      loading = false;
      setTimeout(()=>loadVideos(), 300);
      return;
    } else {
      errorBox.textContent = 'Error: ' + err.message + '. Check API keys/quotas.';
      errorBox.style.display = 'block';
      loader.style.display = 'none';
    }
  }

  loading = false;
}

// Infinite Scroll: one request per threshold (works for both modes)
let scrollDebounce = null;
window.addEventListener('scroll',()=>{
  if(scrollDebounce) return;
  scrollDebounce = setTimeout(()=>{ scrollDebounce = null;
    if((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 600){
      loadVideos();
    }
  }, 150);
});

// Search handling
document.getElementById('go').onclick = ()=>{
  currentQuery = searchInput.value.trim() || 'trending';
  primaryPageToken = '';
  secondaryPageToken = '';
  primaryExhausted = false;
  secondaryExhausted = false;
  currentApi = 'primary';
  loader.textContent = 'Loading more...';
  grid.innerHTML = '';
  loadVideos(true);
};
searchInput.addEventListener('keydown', e=>{
  if(e.key === 'Enter') document.getElementById('go').click();
});

// Turbo toggle behavior
function updateTurboUI(){
  if(turboEnabled){
    turboBtn.classList.add('active'); turboBtn.textContent = 'Turbo: ON';
    // hide shorts toggle
    shortsBtn.style.display = 'none';
    shortsToggleVisible = false;
    // if shortsMode active, disable it (to save net)
    if(shortsMode) toggleShorts(false);
  } else {
    turboBtn.classList.remove('active'); turboBtn.textContent = 'Turbo: OFF';
    // show shorts toggle
    shortsBtn.style.display = '';
    shortsToggleVisible = true;
  }
}
turboBtn.onclick = ()=>{
  turboEnabled = !turboEnabled;
  updateTurboUI();
};
updateTurboUI();

// Shorts toggle behavior
function toggleShorts(enable){
  shortsMode = !!enable;
  if(shortsMode){
    shortsBtn.classList.add('active'); shortsBtn.textContent = 'Shorts: ON';
    // convert grid to shorts layout: clear and re-load pages as shorts content
    grid.innerHTML = '';
    primaryPageToken = '';
    secondaryPageToken = '';
    primaryExhausted = false;
    secondaryExhausted = false;
    currentApi = 'primary';
    loader.textContent = 'Loading shorts...';
    loadVideos(true);
  } else {
    shortsBtn.classList.remove('active'); shortsBtn.textContent = 'Shorts: OFF';
    // remove any active iframes
    document.querySelectorAll('.short .iframe-container').forEach(c=>c.innerHTML='');
    if(shortsObserver){
      shortsObserver.disconnect();
      shortsObserver = null;
    }
    // switch back to grid mode: clear and reload
    grid.innerHTML = '';
    grid.classList.remove('shorts');
    primaryPageToken = '';
    secondaryPageToken = '';
    primaryExhausted = false;
    secondaryExhausted = false;
    currentApi = 'primary';
    loader.textContent = 'Loading more...';
    loadVideos(true);
  }
}

shortsBtn.onclick = ()=>{
  if(turboEnabled) return; // shouldn't happen; shorts hidden when turbo ON
  toggleShorts(!shortsMode);
};

// initial load
loadVideos();
</script>

</body>
</html>
